<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <title>DirectorPrompt</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: rgba(18, 18, 26, 0.82);
            --surface-hover: rgba(30, 30, 42, 0.92);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
            --accent: #6366f1;
            --accent-bright: #818cf8;
            --success: #22c55e;
            --error: #ef4444;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            color-scheme: dark;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            touch-action: none;
            overscroll-behavior: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            outline: 0;
            touch-action: none;
        }

        textarea {
            position: fixed;
            left: 0;
            top: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            border: 0;
            padding: 0;
            resize: none;
        }

        /* ===== 连接覆盖层 ===== */
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(20, 20, 30, 0.96) 0%, rgba(8, 8, 12, 0.99) 100%);
            backdrop-filter: blur(24px) saturate(120%);
            -webkit-backdrop-filter: blur(24px) saturate(120%);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        #overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .overlay-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 36px 44px;
            text-align: center;
        }

        .overlay-brand {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--accent-bright);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .overlay-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .overlay-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ===== 状态指示器 ===== */
        #statusDot {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 16px;
            background: var(--surface);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            z-index: 50;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        #statusDot.visible {
            opacity: 1;
        }

        .status-dot-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        /* ===== 浮动工具栏 ===== */
        #toolbar {
            position: fixed;
            right: max(16px, env(safe-area-inset-right));
            bottom: max(16px, env(safe-area-inset-bottom));
            display: flex;
            gap: 6px;
            padding: 6px;
            background: var(--surface);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
            z-index: 50;
            opacity: 0.55;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        #toolbar:hover,
        #toolbar:focus-within {
            opacity: 1;
        }

        @media (pointer: coarse) {
            #toolbar {
                opacity: 1;
            }
        }

        .tool-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border: 0;
            border-radius: var(--radius-full);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.1s ease;
        }

        .tool-button:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .tool-button:active {
            transform: scale(0.9);
        }

        .tool-button svg {
            width: 21px;
            height: 21px;
        }

        .tool-button.mobile-only {
            display: none;
        }

        @media (pointer: coarse) {
            .tool-button.mobile-only {
                display: flex;
            }
        }

        /* ===== 触摸涟漪 ===== */
        .ripple {
            position: fixed;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: ripple-anim 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 40;
        }

        @keyframes ripple-anim {
            to {
                transform: translate(-50%, -50%) scale(4);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .overlay-card {
                padding: 28px 24px;
            }

            .overlay-title {
                font-size: 16px;
            }

            .overlay-subtitle {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<canvas id="screen" tabindex="0"></canvas>
<textarea id="keyboard" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>

<div id="overlay">
    <div class="overlay-card" id="overlayCard"></div>
</div>

<div id="statusDot">
    <span class="status-dot-indicator"></span>
    <span id="statusText">已连接</span>
</div>

<div id="toolbar">
    <button class="tool-button mobile-only" id="keyboardButton" type="button" title="键盘" aria-label="键盘">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="12" rx="2"/>
            <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
        </svg>
    </button>
    <button class="tool-button" id="fullscreenButton" type="button" title="全屏" aria-label="全屏">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path id="fullscreenPath" d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
    </button>
</div>

<script>
(function () {
    'use strict';

    // ===== DOM =====
    const canvas = document.getElementById('screen');
    const keyboard = document.getElementById('keyboard');
    const overlay = document.getElementById('overlay');
    const overlayCard = document.getElementById('overlayCard');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const toolbar = document.getElementById('toolbar');
    const keyboardButton = document.getElementById('keyboardButton');
    const fullscreenButton = document.getElementById('fullscreenButton');
    const fullscreenPath = document.getElementById('fullscreenPath');
    const context = canvas.getContext('2d');

    // ===== 状态 =====
    let socket = null;
    let frame = null;
    let renderedFrame = null;
    let buttons = 0;
    let touch = null;
    let composing = false;
    let deviceScale = 1;
    let hasConnected = false;
    let reconnectAttempts = 0;
    let reconnectTimer = null;
    let resizeTimer = null;
    let longPressTimer = null;
    let statusHideTimer = null;
    let canvasWidth = 0;
    let canvasHeight = 0;

    const RECONNECT_DELAY = 1000;
    const LONG_PRESS_DELAY = 500;
    const SCROLL_THRESHOLD = 6;
    const STATUS_VISIBLE_DURATION = 2000;

    // ===== 连接管理 =====
    function connect() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        socket = new WebSocket(`${protocol}//${location.host}/remote`);
        socket.binaryType = 'arraybuffer';

        socket.onopen = () => {
            const wasReconnected = hasConnected;
            hasConnected = true;
            reconnectAttempts = 0;
            hideOverlay();
            showStatusDot(wasReconnected ? '已重新连接' : '已连接');
            resize();
        };

        socket.onclose = () => {
            socket = null;
            clearTimeout(reconnectTimer);
            if (hasConnected) {
                reconnectAttempts++;
                showOverlay('reconnecting');
            } else {
                showOverlay('connecting');
            }
            reconnectTimer = setTimeout(connect, RECONNECT_DELAY);
        };

        socket.onerror = () => {};

        socket.onmessage = onMessage;
    }

    function send(message) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(message);
        }
    }

    // ===== 帧渲染 =====
    async function onMessage(event) {
        if (typeof event.data === 'string') {
            const parts = event.data.split(':');
            if (parts[0] === 'frame') {
                frame = {
                    sequence: parts[1],
                    width: +parts[2],
                    height: +parts[3],
                    stride: +parts[4],
                    dpiX: +parts[5],
                    dpiY: +parts[6],
                    compression: parts[7] || 'raw'
                };
            }
            return;
        }

        if (!frame) return;

        const currentFrame = frame;
        frame = null;
        renderedFrame = currentFrame;

        try {
            const bytes = await decodeFrame(event.data, currentFrame.compression);
            const pixels = toPixels(bytes, currentFrame);

            if (canvasWidth !== currentFrame.width || canvasHeight !== currentFrame.height) {
                canvas.width = currentFrame.width;
                canvas.height = currentFrame.height;
                canvasWidth = currentFrame.width;
                canvasHeight = currentFrame.height;
            }

            context.putImageData(new ImageData(pixels, currentFrame.width, currentFrame.height), 0, 0);
            send(`frame-received:${currentFrame.sequence}`);
        } catch (error) {
            console.error('帧渲染失败:', error);
        }
    }

    async function decodeFrame(data, compression) {
        if (compression !== 'gzip') return new Uint8Array(data);
        const stream = new Blob([data]).stream().pipeThrough(new DecompressionStream('gzip'));
        return new Uint8Array(await new Response(stream).arrayBuffer());
    }

    function toPixels(bytes, currentFrame) {
        const rowSize = currentFrame.width * 4;
        if (currentFrame.stride === rowSize) {
            return new Uint8ClampedArray(bytes.buffer, bytes.byteOffset, bytes.byteLength);
        }
        const pixels = new Uint8ClampedArray(rowSize * currentFrame.height);
        for (let row = 0; row < currentFrame.height; row++) {
            pixels.set(
                bytes.subarray(row * currentFrame.stride, row * currentFrame.stride + rowSize),
                row * rowSize
            );
        }
        return pixels;
    }

    // ===== 坐标映射 =====
    function modifiers(event) {
        const values = [];
        if (event.altKey) values.push('Alt');
        if (event.ctrlKey) values.push('Control');
        if (event.shiftKey) values.push('Shift');
        if (event.metaKey) values.push('Windows');
        if (buttons & 1) values.push('LeftMouseButton');
        if (buttons & 2) values.push('RightMouseButton');
        if (buttons & 4) values.push('MiddleMouseButton');
        return values.join(',');
    }

    function point(event) {
        const rect = canvas.getBoundingClientRect();
        const currentFrame = renderedFrame;
        const scale = currentFrame && currentFrame.dpiX > 0 ? currentFrame.dpiX / 96 : deviceScale;
        const logicalWidth = currentFrame && currentFrame.width > 0 ? currentFrame.width / scale : innerWidth;
        const logicalHeight = currentFrame && currentFrame.height > 0 ? currentFrame.height / scale : innerHeight;
        const contentScale = Math.min(rect.width / logicalWidth, rect.height / logicalHeight);
        const contentWidth = logicalWidth * contentScale;
        const contentHeight = logicalHeight * contentScale;
        const contentLeft = rect.left + (rect.width - contentWidth) / 2;
        const contentTop = rect.top + (rect.height - contentHeight) / 2;
        const x = (event.clientX - contentLeft) / contentScale;
        const y = (event.clientY - contentTop) / contentScale;
        return [
            Math.max(0, Math.min(logicalWidth, x)),
            Math.max(0, Math.min(logicalHeight, y))
        ];
    }

    function buttonName(value) {
        return value === 0 ? 'Left' : value === 1 ? 'Middle' : value === 2 ? 'Right' : 'None';
    }

    function pointerMessage(kind, event) {
        const [x, y] = point(event);
        send(`${kind}:${modifiers(event)}:${x}:${y}:${buttonName(event.button)}`);
    }

    // ===== 指针事件 =====
    canvas.addEventListener('pointerdown', (event) => {
        if (event.pointerType === 'touch') {
            canvas.setPointerCapture(event.pointerId);
            touch = {
                pointerId: event.pointerId,
                startX: event.clientX,
                startY: event.clientY,
                lastX: event.clientX,
                lastY: event.clientY,
                moved: false,
                longPress: false
            };
            clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => {
                if (touch && !touch.moved) {
                    touch.longPress = true;
                    if (navigator.vibrate) navigator.vibrate(30);
                    showTouchRipple(event.clientX, event.clientY, 36, 'rgba(99, 102, 241, 0.35)');
                }
            }, LONG_PRESS_DELAY);
            return;
        }
        buttons = event.buttons;
        canvas.setPointerCapture(event.pointerId);
        pointerMessage('pointer-pressed', event);
        keyboard.focus({ preventScroll: true });
    });

    canvas.addEventListener('pointermove', (event) => {
        if (event.pointerType === 'touch' && touch && touch.pointerId === event.pointerId) {
            if (touch.longPress) return;
            const dx = event.clientX - touch.lastX;
            const dy = event.clientY - touch.lastY;
            if (Math.hypot(event.clientX - touch.startX, event.clientY - touch.startY) > SCROLL_THRESHOLD) {
                touch.moved = true;
                clearTimeout(longPressTimer);
            }
            if (touch.moved) {
                const [x, y] = point(event);
                send(`scroll::${x}:${y}:${dx / 30}:${dy / 30}`);
            }
            touch.lastX = event.clientX;
            touch.lastY = event.clientY;
            return;
        }
        buttons = event.buttons;
        const [x, y] = point(event);
        send(`pointer-moved:${modifiers(event)}:${x}:${y}`);
    });

    canvas.addEventListener('pointerup', (event) => {
        if (event.pointerType === 'touch' && touch && touch.pointerId === event.pointerId) {
            clearTimeout(longPressTimer);
            if (!touch.moved) {
                const [x, y] = point(event);
                const btn = touch.longPress ? 'Right' : 'Left';
                send(`pointer-pressed::${x}:${y}:${btn}`);
                send(`pointer-released::${x}:${y}:${btn}`);
                const size = touch.longPress ? 36 : 28;
                const color = touch.longPress ? 'rgba(99, 102, 241, 0.35)' : 'rgba(255, 255, 255, 0.22)';
                showTouchRipple(event.clientX, event.clientY, size, color);
                if (navigator.vibrate) navigator.vibrate(10);
            }
            touch = null;
            return;
        }
        pointerMessage('pointer-released', event);
        buttons = event.buttons;
    });

    canvas.addEventListener('pointercancel', () => {
        clearTimeout(longPressTimer);
        touch = null;
    });

    canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
        const [x, y] = point(event);
        send(`scroll:${modifiers(event)}:${x}:${y}:${-event.deltaX / 100}:${-event.deltaY / 100}`);
    }, { passive: false });

    canvas.addEventListener('contextmenu', (event) => event.preventDefault());

    // ===== 键盘事件 =====
    keyboardButton.addEventListener('click', () => {
        keyboard.focus({ preventScroll: true });
    });

    keyboard.addEventListener('keydown', (event) => {
        if (event.isComposing) return;
        send(`key:down:${modifiers(event)}:${event.key}:${event.code}`);
        if (event.key === 'Tab' ||
            event.key.startsWith('Arrow') ||
            event.key === 'Backspace' ||
            event.key === 'Delete' ||
            event.key === 'Enter') {
            event.preventDefault();
        }
    });

    keyboard.addEventListener('keyup', (event) => {
        if (!event.isComposing) {
            send(`key:up:${modifiers(event)}:${event.key}:${event.code}`);
        }
    });

    keyboard.addEventListener('compositionstart', () => {
        composing = true;
    });

    keyboard.addEventListener('compositionend', (event) => {
        composing = false;
        if (event.data) send(`text:${encodeURIComponent(event.data)}`);
        keyboard.value = '';
    });

    keyboard.addEventListener('input', () => {
        if (composing) return;
        if (keyboard.value) send(`text:${encodeURIComponent(keyboard.value)}`);
        keyboard.value = '';
    });

    // ===== 全屏 =====
    fullscreenButton.addEventListener('click', toggleFullscreen);

    function toggleFullscreen() {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
        if (!isFullscreen) {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    }

    function updateFullscreenIcon() {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
        if (isFullscreen) {
            fullscreenPath.setAttribute('d', 'M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3');
        } else {
            fullscreenPath.setAttribute('d', 'M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3');
        }
    }

    document.addEventListener('fullscreenchange', () => {
        updateFullscreenIcon();
        debouncedResize();
    });
    document.addEventListener('webkitfullscreenchange', () => {
        updateFullscreenIcon();
        debouncedResize();
    });

    // ===== 视口调整 =====
    function resize() {
        deviceScale = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
        send(`resize:${Math.max(360, innerWidth)}:${Math.max(480, innerHeight)}:${deviceScale}`);
    }

    function debouncedResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resize, 150);
    }

    window.addEventListener('resize', debouncedResize);
    window.addEventListener('orientationchange', debouncedResize);

    // ===== 可见性 =====
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                clearTimeout(reconnectTimer);
                connect();
            }
        }
    });

    // ===== UI 管理 =====
    function showOverlay(type) {
        let html = '';
        if (type === 'connecting') {
            html = `
                <div class="overlay-brand">DirectorPrompt</div>
                <div class="spinner"></div>
                <div class="overlay-title">正在连接</div>
                <div class="overlay-subtitle">正在与 DirectorPrompt 建立连接</div>
            `;
        } else if (type === 'reconnecting') {
            const subtitle = reconnectAttempts > 1
                ? `第 ${reconnectAttempts} 次尝试重连`
                : '连接已断开, 正在重连';
            html = `
                <div class="overlay-brand">DirectorPrompt</div>
                <div class="spinner"></div>
                <div class="overlay-title">正在重新连接</div>
                <div class="overlay-subtitle">${subtitle}</div>
            `;
        }
        overlayCard.innerHTML = html;
        overlay.classList.add('visible');
        statusDot.classList.remove('visible');
    }

    function hideOverlay() {
        overlay.classList.remove('visible');
    }

    function showStatusDot(text) {
        statusText.textContent = text;
        statusDot.classList.add('visible');
        clearTimeout(statusHideTimer);
        statusHideTimer = setTimeout(() => {
            statusDot.classList.remove('visible');
        }, STATUS_VISIBLE_DURATION);
    }

    function showTouchRipple(x, y, size, color) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.background = color;
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 500);
    }

    // ===== 启动 =====
    showOverlay('connecting');
    connect();
})();
</script>
</body>
</html>
